  <text x="865" y="110" text-anchor="middle" font-size="10" fill="#15803d">tasklist + wiki + docs</text>
  <line x1="790" y1="98" x2="740" y2="98" stroke="#2f9e44" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arrow-green)"/>

