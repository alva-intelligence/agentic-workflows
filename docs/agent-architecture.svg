  <!-- Developer -->
  <rect x="25" y="78" width="140" height="44" rx="10" fill="#fff3bf" stroke="#f08c00" stroke-width="2" filter="url(#shadow)"/>
  <text x="95" y="105" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">Developer</text>
  <line x1="165" y1="100" x2="255" y2="100" stroke="#f08c00" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="93" text-anchor="middle" font-size="10" fill="#946100">command</text>

  <!-- Orchestra -->
  <rect x="260" y="80" width="250" height="44" rx="10" fill="#d0bfff" stroke="#9c36b5" stroke-width="2" filter="url(#shadow)"/>
